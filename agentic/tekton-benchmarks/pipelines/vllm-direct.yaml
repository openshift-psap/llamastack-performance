apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vllm-direct-benchmark
  namespace: tekton-llamastack
spec:
  description: |
    Benchmark vLLM directly (no LlamaStack).
    Supports two deployment modes: OCI modelcar (deploy-vllm) or RHAIIS HF download (deploy-rhaiis).
    Runs Locust ChatCompletions test, queries Prometheus for inference/GPU/cluster metrics,
    logs everything to MLflow, cleans up.
  params:
    - name: NAMESPACE
      type: string
      default: "llamastack-bench"
    - name: MODEL_NAME
      type: string
      default: "llama-32-3b-instruct"
    - name: USERS
      type: string
      default: "10"
    - name: SPAWN_RATE
      type: string
      default: "1"
    - name: RUN_TIME_SECONDS
      type: string
      default: "60"
    - name: MODEL
      type: string
      default: "llama-32-3b-instruct"
    - name: PROMPT
      type: string
      default: "What is the capital of France?"
    - name: LOAD_SHAPE
      type: string
      default: "steady"
    - name: CUSTOM_STAGES
      type: string
      default: "[]"
    - name: EXTRA_ENV
      type: string
      default: ""
    - name: HPA_POST_TEST_SECONDS
      type: string
      default: "30"
    - name: ENABLE_MLFLOW
      type: string
      default: "false"
    - name: MLFLOW_EXPERIMENT
      type: string
      default: "llamastack-benchmarks"
    - name: MLFLOW_RUN_NAME_PREFIX
      type: string
      default: "tekton"
    - name: INPUT_TOKENS
      type: string
      default: "0"
    - name: OUTPUT_TOKENS
      type: string
      default: "0"
    - name: SKIP_CLEANUP
      type: string
      default: "false"
    - name: WARMUP_SECONDS
      type: string
      default: "300"
    - name: SKIP_DEPLOY_VLLM
      type: string
      default: "false"
    - name: SKIP_DEPLOY_RHAIIS
      type: string
      default: "true"
    - name: PVC_NAME
      type: string
      default: "qwen3-vl-model-pvc"
    - name: PVC_SIZE
      type: string
      default: "120Gi"
    - name: DEPLOY_TIMEOUT
      type: string
      default: "900"
  workspaces:
    - name: results
  tasks:
    - name: generate-configmap
      taskRef:
        name: generate-configmap

    - name: deploy-vllm
      taskRef:
        name: deploy-vllm
      params:
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: MODEL_NAME
          value: $(params.MODEL_NAME)
        - name: SKIP_DEPLOY
          value: $(params.SKIP_DEPLOY_VLLM)

    - name: deploy-rhaiis
      taskRef:
        name: deploy-rhaiis
      params:
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: MODEL_NAME
          value: $(params.MODEL_NAME)
        - name: PVC_NAME
          value: $(params.PVC_NAME)
        - name: PVC_SIZE
          value: $(params.PVC_SIZE)
        - name: DEPLOY_TIMEOUT
          value: $(params.DEPLOY_TIMEOUT)
        - name: SKIP_DEPLOY
          value: $(params.SKIP_DEPLOY_RHAIIS)

    - name: generate-prompt
      taskRef:
        name: generate-prompt
      runAfter:
        - deploy-vllm
        - deploy-rhaiis
      workspaces:
        - name: results
          workspace: results
      params:
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: MODEL_NAME
          value: $(params.MODEL_NAME)
        - name: INPUT_TOKENS
          value: $(params.INPUT_TOKENS)
        - name: USERS
          value: $(params.USERS)
        - name: RUN_TIME_SECONDS
          value: $(params.RUN_TIME_SECONDS)

    - name: run-locust
      taskRef:
        name: run-locust
      runAfter:
        - deploy-vllm
        - deploy-rhaiis
        - generate-configmap
        - generate-prompt
      workspaces:
        - name: results
          workspace: results
      params:
        - name: HOST
          value: "http://$(params.MODEL_NAME)-predictor.$(params.NAMESPACE).svc.cluster.local:80"
        - name: USER_CLASS
          value: "ChatCompletionsUser"
        - name: USERS
          value: $(params.USERS)
        - name: SPAWN_RATE
          value: $(params.SPAWN_RATE)
        - name: RUN_TIME_SECONDS
          value: $(params.RUN_TIME_SECONDS)
        - name: MODEL
          value: $(params.MODEL)
        - name: PROMPT
          value: $(params.PROMPT)
        - name: LOAD_SHAPE
          value: $(params.LOAD_SHAPE)
        - name: CUSTOM_STAGES
          value: $(params.CUSTOM_STAGES)
        - name: EXTRA_ENV
          value: $(params.EXTRA_ENV)
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: DISTRIBUTION_NAME
          value: "none"
        - name: INPUT_TOKENS
          value: $(params.INPUT_TOKENS)
        - name: OUTPUT_TOKENS
          value: $(params.OUTPUT_TOKENS)
        - name: HPA_POST_TEST_SECONDS
          value: $(params.HPA_POST_TEST_SECONDS)
        - name: VLLM_METRICS_HOST
          value: "$(params.MODEL_NAME)-predictor"
        - name: WARMUP_SECONDS
          value: $(params.WARMUP_SECONDS)

    - name: query-prometheus
      taskRef:
        name: query-prometheus
      runAfter:
        - run-locust
      workspaces:
        - name: results
          workspace: results
      params:
        - name: NAMESPACE
          value: $(params.NAMESPACE)

    - name: log-mlflow
      taskRef:
        name: log-mlflow
      runAfter:
        - query-prometheus
      when:
        - input: $(params.ENABLE_MLFLOW)
          operator: in
          values: ["true"]
      workspaces:
        - name: results
          workspace: results
      params:
        - name: MLFLOW_EXPERIMENT
          value: $(params.MLFLOW_EXPERIMENT)
        - name: MLFLOW_RUN_NAME_PREFIX
          value: $(params.MLFLOW_RUN_NAME_PREFIX)
        - name: USER_CLASS
          value: "ChatCompletionsUser"
        - name: USERS
          value: $(params.USERS)
        - name: SPAWN_RATE
          value: $(params.SPAWN_RATE)
        - name: RUN_TIME_SECONDS
          value: $(params.RUN_TIME_SECONDS)
        - name: MODEL
          value: $(params.MODEL)
        - name: PROMPT
          value: $(params.PROMPT)
        - name: LOAD_SHAPE
          value: $(params.LOAD_SHAPE)
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: INPUT_TOKENS
          value: $(params.INPUT_TOKENS)
        - name: OUTPUT_TOKENS
          value: $(params.OUTPUT_TOKENS)
        - name: EXTRA_ENV
          value: $(params.EXTRA_ENV)
        - name: CUSTOM_STAGES
          value: $(params.CUSTOM_STAGES)

    - name: cleanup
      taskRef:
        name: cleanup
      runAfter:
        - log-mlflow
      params:
        - name: NAMESPACE
          value: $(params.NAMESPACE)
        - name: MODEL_NAME
          value: $(params.MODEL_NAME)
        - name: SKIP_CLEANUP
          value: $(params.SKIP_CLEANUP)
        - name: CLEANUP_VLLM
          value: "true"
        - name: CLEANUP_MCP
          value: "false"
