apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-deployer
  namespace: tekton-llamastack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-deployer-role
rules:
  # For deploying PostgreSQL, MCP server
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For creating/managing runner jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "secrets", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For deploying LlamaStack
  - apiGroups: ["llamastack.io"]
    resources: ["llamastackdistributions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For deploying OGXServer (RHOAI 3.5+)
  - apiGroups: ["ogx.io"]
    resources: ["ogxservers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For checking OGX operator readiness
  - apiGroups: ["datasciencecluster.opendatahub.io"]
    resources: ["datascienceclusters"]
    verbs: ["get", "list"]
  # For deploying vLLM (KServe)
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices", "servingruntimes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For checking pod status and exec (generate-prompt uses oc exec/cp into vLLM pod)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # For metrics and HPA
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # For OTel Operator CR
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["opentelemetry.io"]
    resources: ["opentelemetrycollectors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For Tempo Operator CR (flush-tempo step)
  - apiGroups: ["tempo.grafana.com"]
    resources: ["tempomonolithics"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For Tempo OpenShift tenancy mode (requires tokenreview)
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  # For ServiceMonitor creation (OTel metrics scraping)
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # For creating PipelineRuns from runner Jobs
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["get", "list", "watch", "create"]
  # For deleting NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "delete"]
  # For collecting cluster info in MLflow logging
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-deployer-binding
subjects:
  - kind: ServiceAccount
    name: tekton-deployer
    namespace: tekton-llamastack
roleRef:
  kind: ClusterRole
  name: tekton-deployer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-deployer-monitoring-view
subjects:
  - kind: ServiceAccount
    name: tekton-deployer
    namespace: tekton-llamastack
roleRef:
  kind: ClusterRole
  name: cluster-monitoring-view
  apiGroup: rbac.authorization.k8s.io
