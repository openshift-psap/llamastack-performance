apiVersion: batch/v1
kind: Job
metadata:
  name: phase2-chat-all
  namespace: tekton-llamastack
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: tekton-deployer
      restartPolicy: Never
      containers:
      - name: runner
        image: quay.io/openshift/origin-cli:latest
        command: ["bash", "-c"]
        args:
        - |
          set -euo pipefail

          BASE_URL="https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/scripts"
          NS="tekton-llamastack"

          log() { echo "[$(date '+%H:%M:%S')] $*"; }

          run_job() {
            local name="$1" url="$2"
            log "Creating job: $name"
            curl -sL "$url" | oc create -f -
            log "Waiting for job $name to finish..."
            while true; do
              COMPLETE=$(oc get job $name -n $NS -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null)
              FAILED=$(oc get job $name -n $NS -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null)
              if [ "$COMPLETE" = "True" ]; then
                log "Job $name completed successfully"
                break
              elif [ "$FAILED" = "True" ]; then
                log "Job $name finished with some failures (continuing to next profile)"
                break
              fi
              sleep 30
            done
            oc delete job $name -n $NS
          }

          log "Phase 2 — Running moderate + realistic profiles sequentially"

          run_job "phase2-chat-moderate"   "$BASE_URL/phase2-chat-moderate-job.yaml"
          run_job "phase2-chat-realistic"  "$BASE_URL/phase2-chat-realistic-job.yaml"

          log "Phase 2 — All profiles complete"
