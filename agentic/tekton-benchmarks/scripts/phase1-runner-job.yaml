apiVersion: batch/v1
kind: Job
metadata:
  name: phase1-runner
  namespace: tekton-llamastack
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: tekton-deployer
      restartPolicy: Never
      containers:
      - name: runner
        image: quay.io/openshift/origin-cli:latest
        command: ["bash", "-c"]
        args:
        - |
          set -euo pipefail

          # ── Configuration ────────────────────────────────────────────────
          NAMESPACE="vllm-direct-bench"
          TEKTON_NS="tekton-llamastack"
          MODEL_NAME="qwen3-vl-30b-a3b-instruct"
          PIPELINE="rhaiis-direct-benchmark"
          PVC_NAME="qwen3-vl-model-pvc"
          PVC_SIZE="120Gi"
          DEPLOY_TIMEOUT="900"
          MLFLOW_EXPERIMENT="Rhaiis_direct_benchmark"

          CONCURRENCY_LEVELS="1 2 4 8 16 32 64 128"
          REPETITIONS=3
          WARMUP_SECONDS=300
          RUN_TIME_SECONDS=300
          COOLDOWN_SECONDS=300
          INPUT_TOKENS=50
          OUTPUT_TOKENS=50

          RESUME_FROM="${RESUME_FROM:-}"

          # ── Helpers ──────────────────────────────────────────────────────
          TOTAL_RUNS=24
          RUN_COUNTER=0
          PASS_COUNT=0
          FAIL_COUNT=0
          START_TIME=$(date +%s)

          log() { echo "[$(date '+%H:%M:%S')] $*"; }

          wait_for_pipelinerun() {
              local name="$1"
              log "Waiting for PipelineRun $name to complete..."
              while true; do
                  STATUS=$(oc get pipelinerun "$name" -n "$TEKTON_NS" \
                      -o jsonpath='{.status.conditions[0].reason}' 2>/dev/null || echo "Pending")
                  case "$STATUS" in
                      Succeeded)
                          log "PipelineRun $name SUCCEEDED"
                          return 0
                          ;;
                      Failed|PipelineRunCancelled|CouldntGetPipeline|CreateRunFailed)
                          log "PipelineRun $name FAILED (reason: $STATUS)"
                          oc get pipelinerun "$name" -n "$TEKTON_NS" \
                              -o jsonpath='{.status.conditions[0].message}' 2>/dev/null || true
                          echo ""
                          return 1
                          ;;
                      *)
                          sleep 15
                          ;;
                  esac
              done
          }

          elapsed_human() {
              local secs=$1
              printf "%dh %02dm %02ds" $((secs/3600)) $((secs%3600/60)) $((secs%60))
          }

          # ── Run matrix ───────────────────────────────────────────────────
          log "Phase 1: Direct vLLM Baseline — starting $TOTAL_RUNS runs"
          log "CLEANUP_VLLM=true (fresh RHAIIS deploy each run)"

          SKIP_ACTIVE=false
          if [ -n "$RESUME_FROM" ]; then
              SKIP_ACTIVE=true
              log "Will resume from $RESUME_FROM"
          fi

          FIRST_RUN=true
          for USERS in $CONCURRENCY_LEVELS; do
              for REP in $(seq 1 $REPETITIONS); do
                  RUN_COUNTER=$((RUN_COUNTER + 1))
                  RUN_TAG="${USERS}-${REP}"

                  if [ "$SKIP_ACTIVE" = true ]; then
                      if [ "$RUN_TAG" = "$RESUME_FROM" ]; then
                          SKIP_ACTIVE=false
                          log "Resuming from $RUN_TAG"
                      else
                          log "[$RUN_COUNTER/$TOTAL_RUNS] Skipping $RUN_TAG (resume mode)"
                          continue
                      fi
                  fi

                  RUN_NAME="direct-${USERS}u-10min-exp${REP}"

                  if [ "$FIRST_RUN" = false ]; then
                      log "Cooldown: ${COOLDOWN_SECONDS}s..."
                      sleep $COOLDOWN_SECONDS
                  fi
                  FIRST_RUN=false

                  log "============================================================"
                  log "[$RUN_COUNTER/$TOTAL_RUNS] $RUN_NAME"
                  log "  Users: $USERS | Rep: $REP/3"
                  log "============================================================"

                  PR_NAME=$(oc create -f - -n "$TEKTON_NS" -o jsonpath='{.metadata.name}' <<EOF
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: p1-direct-${USERS}u-r${REP}-
            namespace: $TEKTON_NS
            labels:
              phase: "1"
              experiment: "direct-vllm-baseline"
              users: "${USERS}"
              repetition: "${REP}"
          spec:
            pipelineRef:
              name: $PIPELINE
            taskRunTemplate:
              serviceAccountName: tekton-deployer
            workspaces:
              - name: results
                volumeClaimTemplate:
                  spec:
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 1Gi
            params:
              - name: NAMESPACE
                value: "$NAMESPACE"
              - name: MODEL_NAME
                value: "$MODEL_NAME"
              - name: MODEL
                value: "$MODEL_NAME"
              - name: USERS
                value: "$USERS"
              - name: SPAWN_RATE
                value: "$USERS"
              - name: RUN_TIME_SECONDS
                value: "$RUN_TIME_SECONDS"
              - name: INPUT_TOKENS
                value: "$INPUT_TOKENS"
              - name: OUTPUT_TOKENS
                value: "$OUTPUT_TOKENS"
              - name: WARMUP_SECONDS
                value: "$WARMUP_SECONDS"
              - name: LOAD_SHAPE
                value: "steady"
              - name: ENABLE_MLFLOW
                value: "true"
              - name: MLFLOW_EXPERIMENT
                value: "$MLFLOW_EXPERIMENT"
              - name: MLFLOW_RUN_NAME_PREFIX
                value: "$RUN_NAME"
              - name: PVC_NAME
                value: "$PVC_NAME"
              - name: PVC_SIZE
                value: "$PVC_SIZE"
              - name: DEPLOY_TIMEOUT
                value: "$DEPLOY_TIMEOUT"
              - name: SKIP_DEPLOY
                value: "false"
              - name: SKIP_CLEANUP
                value: "false"
              - name: CLEANUP_VLLM
                value: "true"
          EOF
                  )

                  log "Created PipelineRun: $PR_NAME"

                  if wait_for_pipelinerun "$PR_NAME"; then
                      PASS_COUNT=$((PASS_COUNT + 1))
                      log "PASS [$RUN_COUNTER/$TOTAL_RUNS] $RUN_NAME"
                  else
                      FAIL_COUNT=$((FAIL_COUNT + 1))
                      log "FAIL [$RUN_COUNTER/$TOTAL_RUNS] $RUN_NAME"
                  fi

                  ELAPSED=$(($(date +%s) - START_TIME))
                  log "Progress: $RUN_COUNTER/$TOTAL_RUNS | Elapsed: $(elapsed_human $ELAPSED)"
                  echo ""
              done
          done

          TOTAL_ELAPSED=$(($(date +%s) - START_TIME))
          log "============================================================"
          log "Phase 1 Complete"
          log "Passed: $PASS_COUNT | Failed: $FAIL_COUNT | Time: $(elapsed_human $TOTAL_ELAPSED)"
          log "============================================================"
          [ $FAIL_COUNT -gt 0 ] && exit 1 || exit 0
