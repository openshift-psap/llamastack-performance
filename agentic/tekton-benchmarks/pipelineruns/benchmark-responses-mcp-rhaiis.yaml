apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: benchmark-responses-mcp-rhaiis-
  namespace: tekton-llamastack
spec:
  pipelineRef:
    name: responses-mcp-benchmark
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: results
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  params:
    - name: NAMESPACE
      value: "llamastack-bench"
    - name: DISTRIBUTION_NAME
      value: "llamastack-benchmark"
    - name: MODEL_NAME
      value: "qwen3-vl-30b-a3b-instruct"
    - name: USERS
      value: "10"
    - name: RUN_TIME_SECONDS
      value: "60"
    - name: MODEL
      value: "vllm-inference/qwen3-vl-30b-a3b-instruct"
    - name: PROMPT
      value: "What is SDG and how does it work?"
    - name: LOAD_SHAPE
      value: "steady"
    - name: ENABLE_MLFLOW
      value: "true"
    - name: MLFLOW_EXPERIMENT
      value: "rhaiis-benchmarks"
    # RHAIIS mode
    - name: SKIP_DEPLOY_VLLM
      value: "true"
    - name: SKIP_DEPLOY_RHAIIS
      value: "false"
    - name: PVC_NAME
      value: "qwen3-vl-model-pvc"
    - name: SKIP_CLEANUP
      value: "true"
