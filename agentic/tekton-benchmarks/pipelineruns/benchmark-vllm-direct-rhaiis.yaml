apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: benchmark-vllm-direct-rhaiis-
  namespace: tekton-llamastack
spec:
  pipelineRef:
    name: vllm-direct-benchmark
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: results
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  params:
    - name: NAMESPACE
      value: "llamastack-bench"
    - name: MODEL_NAME
      value: "qwen3-vl-30b-a3b-instruct"
    - name: USERS
      value: "10"
    - name: RUN_TIME_SECONDS
      value: "60"
    - name: MODEL
      value: "qwen3-vl-30b-a3b-instruct"
    - name: PROMPT
      value: "What is the capital of France?"
    - name: LOAD_SHAPE
      value: "steady"
    - name: ENABLE_MLFLOW
      value: "true"
    - name: MLFLOW_EXPERIMENT
      value: "rhaiis-benchmarks"
    # RHAIIS mode: deploy-vllm skipped, deploy-rhaiis active
    - name: SKIP_DEPLOY_VLLM
      value: "true"
    - name: SKIP_DEPLOY_RHAIIS
      value: "false"
    - name: PVC_NAME
      value: "qwen3-vl-model-pvc"
    - name: PVC_SIZE
      value: "120Gi"
    - name: DEPLOY_TIMEOUT
      value: "900"
