apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: benchmark-rhaiis-direct-
  namespace: tekton-llamastack
spec:
  pipelineRef:
    name: rhaiis-direct-benchmark
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: results
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  params:
    - name: NAMESPACE
      value: "vllm-direct-bench"
    - name: MODEL_NAME
      value: "qwen3-vl-30b-a3b-instruct"
    - name: MODEL
      value: "qwen3-vl-30b-a3b-instruct"
    - name: USERS
      value: "128"
    - name: SPAWN_RATE
      value: "128"
    - name: RUN_TIME_SECONDS
      value: "600"
    - name: INPUT_TOKENS
      value: "1000"
    - name: OUTPUT_TOKENS
      value: "1000"
    - name: WARMUP_SECONDS
      value: "300"
    - name: LOAD_SHAPE
      value: "steady"
    - name: ENABLE_MLFLOW
      value: "true"
    - name: MLFLOW_EXPERIMENT
      value: "rhaiis-benchmarks"
    - name: PVC_NAME
      value: "qwen3-vl-model-pvc"
    - name: PVC_SIZE
      value: "120Gi"
    - name: DEPLOY_TIMEOUT
      value: "900"
