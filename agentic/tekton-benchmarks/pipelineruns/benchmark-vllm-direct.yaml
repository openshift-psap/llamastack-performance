apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: benchmark-vllm-direct-
  namespace: tekton-llamastack
spec:
  pipelineRef:
    name: vllm-direct-benchmark
  taskRunTemplate:
    serviceAccountName: tekton-deployer
  workspaces:
    - name: results
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
  params:
    - name: NAMESPACE
      value: "vllm-direct-bench"
    - name: MODEL_NAME
      value: "llama-32-3b-instruct"
    - name: USERS
      value: "100"
    - name: RUN_TIME_SECONDS
      value: "60"
    - name: MODEL
      value: "llama-32-3b-instruct"
    - name: PROMPT
      value: "What is the capital of France?"
    - name: LOAD_SHAPE
      value: "steady"
    - name: ENABLE_MLFLOW
      value: "true"
    - name: MLFLOW_EXPERIMENT
      value: "llamastack-tekton-pipeline"
    # OCI modelcar mode (default): deploy-vllm active, deploy-rhaiis skipped
    - name: SKIP_DEPLOY_VLLM
      value: "false"
    - name: SKIP_DEPLOY_RHAIIS
      value: "true"
