apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-rhaiis
  namespace: tekton-llamastack
spec:
  description: |
    Deploys a model via RHAIIS (Red Hat AI Inference Server).
    Creates a PVC for model cache (persists across runs), deploys
    ServingRuntime + InferenceService, and waits for readiness.
    First run downloads the model from HuggingFace (~62GB for Qwen3-VL-30B);
    subsequent runs reuse the cached weights on the PVC.
  params:
    - name: NAMESPACE
      description: Namespace to deploy the model
      type: string
      default: "llamastack-bench"
    - name: MODEL_NAME
      description: Name of the model/InferenceService
      type: string
      default: "qwen3-vl-30b-a3b-instruct"
    - name: SERVINGRUNTIME_PATH
      description: URL or path to ServingRuntime manifest
      type: string
      default: "https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/manifests/rhaiis-qwen3vl-servingruntime.yaml"
    - name: INFERENCESERVICE_PATH
      description: URL or path to InferenceService manifest
      type: string
      default: "https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/manifests/rhaiis-qwen3vl-inferenceservice.yaml"
    - name: PVC_NAME
      description: Name of the PVC for model cache storage
      type: string
      default: "qwen3-vl-model-pvc"
    - name: PVC_SIZE
      description: Size of the model cache PVC
      type: string
      default: "120Gi"
    - name: DEPLOY_TIMEOUT
      description: Timeout in seconds waiting for model readiness (first run needs longer for HF download)
      type: string
      default: "900"
    - name: SKIP_DEPLOY
      description: If "true", skips deployment (assumes model already running)
      type: string
      default: "false"
  steps:
    - name: create-pvc
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        if [ "$(params.SKIP_DEPLOY)" = "true" ]; then
          echo "SKIP_DEPLOY is true, skipping PVC creation."
          exit 0
        fi

        echo "Checking for model cache PVC..."
        if oc get pvc $(params.PVC_NAME) -n $(params.NAMESPACE) &>/dev/null; then
          echo "PVC $(params.PVC_NAME) already exists, reusing."
        else
          echo "Creating PVC $(params.PVC_NAME) ($(params.PVC_SIZE))..."
          oc apply -f - -n $(params.NAMESPACE) <<EOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: $(params.PVC_NAME)
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: $(params.PVC_SIZE)
        EOF
          echo "PVC created."
        fi

    - name: deploy-model
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        if [ "$(params.SKIP_DEPLOY)" = "true" ]; then
          echo "SKIP_DEPLOY is true, skipping RHAIIS deployment."
          echo "Assuming model is already running."
          exit 0
        fi

        echo "=============================================="
        echo "Deploying RHAIIS Model Serving"
        echo "=============================================="
        echo "Namespace: $(params.NAMESPACE)"
        echo "Model: $(params.MODEL_NAME)"
        echo "Timeout: $(params.DEPLOY_TIMEOUT)s"
        echo ""

        echo "Cleaning up existing deployment..."
        oc delete inferenceservice $(params.MODEL_NAME) -n $(params.NAMESPACE) --ignore-not-found=true
        oc delete servingruntime $(params.MODEL_NAME) -n $(params.NAMESPACE) --ignore-not-found=true

        echo "Waiting for cleanup..."
        sleep 10

        echo "Deploying ServingRuntime..."
        oc apply -f $(params.SERVINGRUNTIME_PATH) -n $(params.NAMESPACE)

        echo "Deploying InferenceService..."
        oc apply -f $(params.INFERENCESERVICE_PATH) -n $(params.NAMESPACE)

        echo "Waiting for InferenceService to be ready..."
        echo "(First run downloads model from HuggingFace — this may take 10+ minutes)"

        timeout=$(params.DEPLOY_TIMEOUT)
        counter=0
        while [ $counter -lt $timeout ]; do
          READY=$(oc get inferenceservice $(params.MODEL_NAME) -n $(params.NAMESPACE) -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "False")

          if [ "$READY" = "True" ]; then
            echo ""
            echo "=============================================="
            echo "RHAIIS model deployed successfully!"
            echo "=============================================="
            oc get inferenceservice $(params.MODEL_NAME) -n $(params.NAMESPACE)

            echo ""
            echo "Creating vLLM metrics ServiceMonitor..."
            cat <<SM_EOF | oc apply -n $(params.NAMESPACE) -f -
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: vllm-rhaiis-metrics
        spec:
          endpoints:
            - port: http
              path: /metrics
              interval: 15s
          selector:
            matchLabels:
              serving.kserve.io/inferenceservice: $(params.MODEL_NAME)
          namespaceSelector:
            matchNames:
              - $(params.NAMESPACE)
        SM_EOF
            echo "ServiceMonitor created for vLLM RHAIIS metrics"

            exit 0
          fi

          sleep 10
          counter=$((counter + 10))
          if [ $((counter % 60)) -eq 0 ]; then
            echo "  Still waiting... (${counter}s / ${timeout}s)"
            POD=$(oc get pod -n $(params.NAMESPACE) -l serving.kserve.io/inferenceservice=$(params.MODEL_NAME) -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$POD" ]; then
              PHASE=$(oc get pod $POD -n $(params.NAMESPACE) -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
              echo "  Pod: $POD ($PHASE)"
            fi
          fi
        done

        echo ""
        echo "ERROR: RHAIIS model did not become ready in time (${timeout} seconds)"
        oc get inferenceservice $(params.MODEL_NAME) -n $(params.NAMESPACE) -o yaml
        oc get pods -n $(params.NAMESPACE) -l serving.kserve.io/inferenceservice=$(params.MODEL_NAME)
        exit 1
