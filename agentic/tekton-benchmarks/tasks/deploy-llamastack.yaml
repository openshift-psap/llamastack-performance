apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-llamastack
  namespace: tekton-llamastack
spec:
  description: |
    Deploy LlamaStackDistribution.
    Waits for the distribution to be ready before completing.
  params:
    - name: NAMESPACE
      description: Namespace to deploy LlamaStack
      type: string
      default: "llamastack"
    - name: MANIFEST_PATH
      description: Path to LlamaStackDistribution manifest
      type: string
      default: "https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/manifests/llamastack.yaml"
    - name: DISTRIBUTION_NAME
      description: Name of the LlamaStackDistribution
      type: string
      default: "llamastack-benchmark"
    - name: VLLM_NAMESPACE
      description: Namespace where vLLM is running (for cross-namespace reference)
      type: string
      default: ""
    - name: MODEL_NAME
      description: Name of the vLLM model/InferenceService (used to construct predictor service name)
      type: string
      default: "llama-32-3b-instruct"
    - name: SKIP_DEPLOY
      description: If "true", skips deployment
      type: string
      default: "false"
    - name: DISABLE_OTEL
      description: If "true", disables OpenTelemetry in LlamaStack (sets OTEL_SDK_DISABLED=true, removes collector env vars)
      type: string
      default: "false"
  steps:
    - name: deploy-llamastack
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e
        
        if [ "$(params.SKIP_DEPLOY)" = "true" ]; then
          echo "SKIP_DEPLOY is true, skipping LlamaStack deployment."
          exit 0
        fi
        
        echo "=============================================="
        echo "Deploying LlamaStack"
        echo "=============================================="
        echo "Namespace: $(params.NAMESPACE)"
        echo "Distribution: $(params.DISTRIBUTION_NAME)"
        echo ""
        
        # Delete existing LlamaStack if present
        echo "Cleaning up existing LlamaStack..."
        oc delete llamastackdistribution $(params.DISTRIBUTION_NAME) -n $(params.NAMESPACE) --ignore-not-found=true
        
        echo "Waiting for cleanup..."
        sleep 10
        
        # Download and patch manifest with correct model predictor name
        MODEL_PREDICTOR="$(params.MODEL_NAME)-predictor"
        VLLM_NS="$(params.VLLM_NAMESPACE)"
        DISABLE_OTEL="$(params.DISABLE_OTEL)"
        echo "Model predictor: $MODEL_PREDICTOR"
        echo "Disable OTel: $DISABLE_OTEL"

        # Build the sed pipeline for common patches
        MANIFEST=$(curl -sL $(params.MANIFEST_PATH))

        if [ -n "$VLLM_NS" ] && [ "$VLLM_NS" != "$(params.NAMESPACE)" ]; then
          echo "Patching VLLM_URL for cross-namespace access (vLLM in $VLLM_NS)..."
          MANIFEST=$(echo "$MANIFEST" | \
            sed "s|http://llama-32-3b-instruct-predictor:80/v1|http://${MODEL_PREDICTOR}.${VLLM_NS}.svc.cluster.local:80/v1|g")
        else
          MANIFEST=$(echo "$MANIFEST" | \
            sed "s|http://llama-32-3b-instruct-predictor:80/v1|http://${MODEL_PREDICTOR}:80/v1|g")
        fi

        MANIFEST=$(echo "$MANIFEST" | \
          sed "s|value: \"llama-32-3b-instruct\"|value: \"$(params.MODEL_NAME)\"|g" | \
          sed "s|NAMESPACE_PLACEHOLDER|$(params.NAMESPACE)|g")

        # If DISABLE_OTEL=true, strip OTel env vars and inject OTEL_SDK_DISABLED=true
        if [ "$DISABLE_OTEL" = "true" ]; then
          echo "Disabling OpenTelemetry — removing collector env vars, setting OTEL_SDK_DISABLED=true"
          # Remove the 4 OTel env var blocks (name + value lines)
          MANIFEST=$(echo "$MANIFEST" | \
            sed '/- name: OTEL_EXPORTER_OTLP_ENDPOINT/{N;d;}' | \
            sed '/- name: OTEL_EXPORTER_OTLP_PROTOCOL/{N;d;}' | \
            sed '/- name: OTEL_SERVICE_NAME/{N;d;}' | \
            sed '/- name: OTEL_RESOURCE_ATTRIBUTES/{N;d;}' | \
            sed '/# OpenTelemetry/d')
          # Inject OTEL_SDK_DISABLED=true after the POSTGRES_HOST env var
          MANIFEST=$(echo "$MANIFEST" | \
            sed '/- name: POSTGRES_HOST/i\        - name: OTEL_SDK_DISABLED\n          value: "true"')
        fi

        echo "Deploying LlamaStackDistribution..."
        echo "$MANIFEST" | oc apply -f - -n $(params.NAMESPACE)
        
        # Wait for LlamaStack to be ready
        echo "Waiting for LlamaStack to be ready..."
        for i in {1..60}; do
          PHASE=$(oc get llamastackdistribution $(params.DISTRIBUTION_NAME) -n $(params.NAMESPACE) -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
          echo "  Status: $PHASE"
          if [ "$PHASE" = "Ready" ]; then
            echo ""
            echo "=============================================="
            echo "LlamaStack deployed successfully!"
            echo "=============================================="
            exit 0
          fi
          sleep 5
        done
        
        echo "ERROR: LlamaStack did not become ready in time"
        exit 1
