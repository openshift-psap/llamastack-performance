apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: log-mlflow
  namespace: tekton-llamastack
spec:
  description: |
    Analyze traces from Tempo and log all benchmark results to MLflow.
    Step 1: Query Tempo for traces, compute derived metrics, write trace_metrics.json.
    Step 2: Read all result files from workspace and batch-log to SageMaker MLflow.
    Scripts are mounted from the mlflow-scripts ConfigMap.
  params:
    - name: MLFLOW_EXPERIMENT
      description: MLflow experiment name
      type: string
      default: "llamastack-benchmarks"
    - name: MLFLOW_RUN_NAME_PREFIX
      description: Prefix for the MLflow run name
      type: string
      default: "tekton"
    - name: TEMPO_ENDPOINT
      description: Tempo HTTP API endpoint for trace queries
      type: string
      default: "http://tempo-tracing.openshift-tempo-operator.svc.cluster.local:3200"
    - name: OTEL_SERVICE_NAME
      description: Service name to filter traces in Tempo
      type: string
      default: "llamastack"
    - name: USERS
      type: string
      default: "10"
    - name: SPAWN_RATE
      type: string
      default: "1"
    - name: RUN_TIME_SECONDS
      type: string
      default: "60"
    - name: MODEL
      type: string
      default: "vllm-inference/llama-32-3b-instruct"
    - name: MCP_SERVER
      type: string
      default: ""
    - name: PROMPT
      type: string
      default: ""
    - name: LOAD_SHAPE
      type: string
      default: "steady"
    - name: USER_CLASS
      type: string
      default: "ResponsesMCPUser"
    - name: NAMESPACE
      type: string
      default: "llamastack-bench"
    - name: DISTRIBUTION_NAME
      type: string
      default: "llamastack-benchmark"
    - name: INPUT_TOKENS
      description: "Input token count used for this test"
      type: string
      default: "0"
    - name: OUTPUT_TOKENS
      description: "Output token limit used for this test"
      type: string
      default: "0"
    - name: EXTRA_ENV
      description: "Shape-specific params to log (KEY=VALUE per line)"
      type: string
      default: ""
    - name: CUSTOM_STAGES
      description: "Custom shape stages JSON to log"
      type: string
      default: "[]"
  workspaces:
    - name: results
      description: Shared workspace containing test result files from run-locust
  steps:
    - name: collect-versions
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e
        RESULTS_DIR="$(workspaces.results.path)"
        NS="$(params.NAMESPACE)"
        USER_CLASS="$(params.USER_CLASS)"

        echo "Collecting cluster and component versions..."

        # --- Cluster info (always collected) ---
        OCP_VERSION=$(oc get clusterversion version -o jsonpath='{.status.desired.version}' 2>/dev/null || echo "unknown")
        RHOAI_VERSION=$(oc get csv -n redhat-ods-operator -o jsonpath='{.items[?(@.spec.displayName=="Red Hat OpenShift AI")].spec.version}' 2>/dev/null || echo "unknown")

        MASTER_NODES=$(oc get nodes -l node-role.kubernetes.io/master --no-headers 2>/dev/null | wc -l | tr -d ' ')
        WORKER_NODES=$(oc get nodes -l node-role.kubernetes.io/worker --no-headers 2>/dev/null | wc -l | tr -d ' ')
        GPU_NODES=$(oc get nodes -l nvidia.com/gpu.present=true --no-headers 2>/dev/null | wc -l | tr -d ' ')
        GPU_PRODUCT=$(oc get nodes -l nvidia.com/gpu.present=true -o jsonpath='{.items[0].metadata.labels.nvidia\.com/gpu\.product}' 2>/dev/null || echo "unknown")
        GPU_COUNT=$(oc get nodes -l nvidia.com/gpu.present=true -o jsonpath='{.items[0].status.capacity.nvidia\.com/gpu}' 2>/dev/null || echo "unknown")

        # --- vLLM / RHAIIS info (always collected for any test type) ---
        VLLM_IMAGE="unknown"
        VLLM_ARGS="unknown"
        ISVC=$(oc get inferenceservice -n $NS -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
        if [ -n "$ISVC" ]; then
          VLLM_POD=$(oc get pod -n $NS -l serving.kserve.io/inferenceservice=$ISVC -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$VLLM_POD" ]; then
            VLLM_IMAGE=$(oc get pod $VLLM_POD -n $NS -o jsonpath='{.spec.containers[?(@.name=="kserve-container")].image}' 2>/dev/null || echo "unknown")
            VLLM_ARGS=$(oc get pod $VLLM_POD -n $NS -o jsonpath='{.spec.containers[?(@.name=="kserve-container")].args}' 2>/dev/null || echo "unknown")
          fi
        fi

        # --- LlamaStack info (only for LlamaStack tests) ---
        LS_IMAGE="n/a"
        LS_OPERATOR_VERSION="n/a"
        PG_IMAGE="n/a"
        if [ "$USER_CLASS" != "ChatCompletionsUser" ]; then
          LS_OPERATOR_VERSION=$(oc get csv -n llama-stack-k8s-operator-system -o jsonpath='{.items[?(@.spec.displayName)].spec.version}' 2>/dev/null || echo "unknown")
          [ -z "$LS_OPERATOR_VERSION" ] && LS_OPERATOR_VERSION="unknown"
          LS_IMAGE=$(oc get llamastackdistribution $(params.DISTRIBUTION_NAME) -n $NS -o jsonpath='{.spec.server.distribution.image}' 2>/dev/null || echo "unknown")
          PG_IMAGE=$(oc get deployment postgres -n $NS -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown")
        fi

        cat > "$RESULTS_DIR/cluster_versions.json" <<VERSIONS_EOF
        {
          "openshift_version": "$OCP_VERSION",
          "openshift_ai_version": "$RHOAI_VERSION",
          "cluster_master_nodes": "$MASTER_NODES",
          "cluster_worker_nodes": "$WORKER_NODES",
          "cluster_gpu_nodes": "$GPU_NODES",
          "gpu_product": "$GPU_PRODUCT",
          "gpu_count_per_node": "$GPU_COUNT",
          "vllm_image": "$VLLM_IMAGE",
          "vllm_args": "$VLLM_ARGS",
          "llamastack_operator_version": "$LS_OPERATOR_VERSION",
          "llamastack_image": "$LS_IMAGE",
          "postgres_image": "$PG_IMAGE"
        }
        VERSIONS_EOF

        echo "Collected versions:"
        cat "$RESULTS_DIR/cluster_versions.json"

    - name: analyze-traces
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/bin/bash
        set -e
        pip install --quiet requests
        python3 /scripts/trace_analyzer.py \
          --results-dir "$(workspaces.results.path)" \
          --tempo-endpoint "$(params.TEMPO_ENDPOINT)" \
          --service-name "$(params.OTEL_SERVICE_NAME)" \
          --namespace "$(params.NAMESPACE)"
      volumeMounts:
        - name: scripts
          mountPath: /scripts

    - name: log-to-mlflow
      image: registry.access.redhat.com/ubi9/python-311:latest
      env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: mlflow-aws-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: mlflow-aws-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: mlflow-aws-credentials
              key: AWS_DEFAULT_REGION
              optional: true
        - name: MLFLOW_TRACKING_ARN
          valueFrom:
            secretKeyRef:
              name: mlflow-aws-credentials
              key: MLFLOW_TRACKING_ARN
      script: |
        #!/bin/bash
        set -e
        pip install --quiet mlflow sagemaker-mlflow boto3
        python3 /scripts/mlflow_logger.py \
          --results-dir "$(workspaces.results.path)" \
          --experiment "$(params.MLFLOW_EXPERIMENT)" \
          --run-name-prefix "$(params.MLFLOW_RUN_NAME_PREFIX)" \
          --param users="$(params.USERS)" \
          --param spawn_rate="$(params.SPAWN_RATE)" \
          --param run_time_seconds="$(params.RUN_TIME_SECONDS)" \
          --param model="$(params.MODEL)" \
          --param mcp_server="$(params.MCP_SERVER)" \
          --param prompt="$(params.PROMPT)" \
          --param load_shape="$(params.LOAD_SHAPE)" \
          --param user_class="$(params.USER_CLASS)" \
          --param namespace="$(params.NAMESPACE)" \
          --param distribution_name="$(params.DISTRIBUTION_NAME)" \
          --param input_tokens="$(params.INPUT_TOKENS)" \
          --param output_tokens="$(params.OUTPUT_TOKENS)" \
          --param custom_stages='$(params.CUSTOM_STAGES)' \
          $(echo '$(params.EXTRA_ENV)' | while IFS= read -r line; do
            if [ -n "$line" ] && echo "$line" | grep -q "="; then
              KEY=$(echo "$line" | cut -d= -f1 | tr '[:upper:]' '[:lower:]')
              VALUE=$(echo "$line" | cut -d= -f2-)
              echo "--param ${KEY}=${VALUE}"
            fi
          done)
      volumeMounts:
        - name: scripts
          mountPath: /scripts
  volumes:
    - name: scripts
      configMap:
        name: mlflow-scripts
