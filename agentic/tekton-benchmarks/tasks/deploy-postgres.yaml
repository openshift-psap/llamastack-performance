apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-postgres
  namespace: tekton-llamastack
spec:
  description: |
    Deploy PostgreSQL for LlamaStack.
    Deletes existing deployment first for a fresh database.
  params:
    - name: NAMESPACE
      description: Namespace to deploy PostgreSQL
      type: string
      default: "llamastack"
    - name: MANIFEST_PATH
      description: Path to PostgreSQL manifest
      type: string
      default: "https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/manifests/postgres.yaml"
    - name: SKIP_DEPLOY
      description: If "true", skips deployment
      type: string
      default: "false"
  steps:
    - name: deploy-postgres
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e
        
        if [ "$(params.SKIP_DEPLOY)" = "true" ]; then
          echo "SKIP_DEPLOY is true, skipping PostgreSQL deployment."
          exit 0
        fi
        
        echo "=============================================="
        echo "Deploying PostgreSQL"
        echo "=============================================="
        echo "Namespace: $(params.NAMESPACE)"
        echo ""
        
        # Delete existing PostgreSQL if present
        echo "Cleaning up existing PostgreSQL..."
        oc delete deployment postgres -n $(params.NAMESPACE) --ignore-not-found=true
        oc delete service postgres-db -n $(params.NAMESPACE) --ignore-not-found=true
        oc delete service postgres -n $(params.NAMESPACE) --ignore-not-found=true
        
        # Wait for pods to fully terminate before deleting PVC (finalizer blocks until pod releases volume)
        echo "Waiting for postgres pods to terminate..."
        oc wait --for=delete pod -l app=postgres -n $(params.NAMESPACE) --timeout=60s 2>/dev/null || true
        
        oc delete pvc postgres-pvc -n $(params.NAMESPACE) --ignore-not-found=true
        oc delete secret postgres-secret -n $(params.NAMESPACE) --ignore-not-found=true
        
        # Wait for PVC to be fully removed
        echo "Waiting for PVC deletion..."
        oc wait --for=delete pvc/postgres-pvc -n $(params.NAMESPACE) --timeout=60s 2>/dev/null || true
        
        # Deploy fresh PostgreSQL
        echo "Deploying fresh PostgreSQL..."
        oc apply -f $(params.MANIFEST_PATH) -n $(params.NAMESPACE)

        # Create custom queries ConfigMap for postgres-exporter (table sizes)
        QUERIES_URL=$(echo "$(params.MANIFEST_PATH)" | sed 's|/postgres.yaml|/postgres-exporter-queries.yaml|')
        echo "Creating postgres-exporter custom queries ConfigMap..."
        oc create configmap postgres-exporter-queries -n $(params.NAMESPACE) \
          --from-file=queries.yaml=<(curl -sL "$QUERIES_URL") \
          --dry-run=client -o yaml | oc apply -f - -n $(params.NAMESPACE)
        
        # Wait for PVC to bind (IBM Cloud block storage can take 2-4 minutes to provision)
        echo "Waiting for PVC to bind..."
        oc wait --for=jsonpath='{.status.phase}'=Bound pvc/postgres-pvc -n $(params.NAMESPACE) --timeout=300s
        
        # Wait for PostgreSQL deployment to be available
        echo "Waiting for PostgreSQL to be ready..."
        oc wait --for=condition=available deployment/postgres -n $(params.NAMESPACE) --timeout=180s
        
        # Create ServiceMonitor so OpenShift Prometheus scrapes postgres-exporter metrics
        cat <<SM_EOF | oc apply -n $(params.NAMESPACE) -f -
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        metadata:
          name: postgres-exporter-metrics
        spec:
          endpoints:
            - port: metrics
              interval: 15s
          selector:
            matchLabels:
              app: postgres
          namespaceSelector:
            matchNames:
              - $(params.NAMESPACE)
        SM_EOF

        echo ""
        echo "=============================================="
        echo "PostgreSQL deployed successfully!"
        echo "=============================================="
