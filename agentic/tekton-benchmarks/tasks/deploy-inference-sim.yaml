apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-inference-sim
  namespace: tekton-llamastack
spec:
  description: |
    Deploys llm-d-inference-sim as a drop-in replacement for vLLM.
    Uses the manifest at manifests/inference-sim.yaml.
  params:
    - name: NAMESPACE
      description: Namespace to deploy the simulator
      type: string
      default: "llamastack-bench"
    - name: MANIFEST_PATH
      description: URL or path to the inference-sim manifest
      type: string
      default: "https://raw.githubusercontent.com/openshift-psap/llamastack-performance/main/agentic/tekton-benchmarks/manifests/inference-sim.yaml"
    - name: TTFT_MS
      description: "Time to first token in milliseconds (e.g., 1, 130, 400, 3700)"
      type: string
      default: "1"
    - name: ITL_MS
      description: "Inter-token latency in milliseconds (e.g., 1, 7, 30, 85)"
      type: string
      default: "1"
    - name: SKIP_DEPLOY
      description: If "true", skips deployment (assumes simulator already running)
      type: string
      default: "false"
  steps:
    - name: deploy-simulator
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        if [ "$(params.SKIP_DEPLOY)" = "true" ]; then
          echo "SKIP_DEPLOY is true, skipping simulator deployment."
          exit 0
        fi

        NS="$(params.NAMESPACE)"
        NAME="inference-sim"
        TTFT="$(params.TTFT_MS)"
        ITL="$(params.ITL_MS)"

        echo "=============================================="
        echo "Deploying llm-d-inference-sim"
        echo "=============================================="
        echo "Namespace: $NS"
        echo "TTFT: ${TTFT}ms"
        echo "ITL:  ${ITL}ms"
        echo ""

        # Clean up existing deployment
        echo "Cleaning up existing simulator deployment..."
        oc delete deployment $NAME -n $NS --ignore-not-found=true
        oc delete service $NAME -n $NS --ignore-not-found=true
        oc delete servicemonitor inference-sim-metrics -n $NS --ignore-not-found=true
        sleep 3

        # Deploy from manifest, patching TTFT and ITL values
        echo "Applying manifest with TTFT=${TTFT}ms, ITL=${ITL}ms..."
        MANIFEST=$(curl -sL $(params.MANIFEST_PATH))
        MANIFEST=$(echo "$MANIFEST" | sed '/--time-to-first-token/{n;s/"[0-9]*ms"/"'"${TTFT}ms"'"/}')
        MANIFEST=$(echo "$MANIFEST" | sed '/--inter-token-latency/{n;s/"[0-9]*ms"/"'"${ITL}ms"'"/}')
        echo "$MANIFEST" | oc apply -n $NS -f -

        # Wait for deployment to be ready
        echo "Waiting for simulator to be ready..."
        oc rollout status deployment/$NAME -n $NS --timeout=120s

        # Verify health
        SIM_POD=$(oc get pods -n $NS -l app=$NAME -o jsonpath='{.items[0].metadata.name}')
        echo "Simulator pod: $SIM_POD"

        echo ""
        echo "=============================================="
        echo "Inference simulator deployed successfully!"
        echo "Service: $NAME.$NS.svc.cluster.local:8000"
        echo "TTFT: ${TTFT}ms | ITL: ${ITL}ms"
        echo "=============================================="
