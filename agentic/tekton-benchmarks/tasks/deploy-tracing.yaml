apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-tracing
  namespace: tekton-llamastack
spec:
  description: |
    Flush Tempo trace storage and deploy OpenTelemetry Collector.
    Step 1: Delete and recreate the TempoMonolithic CR to start with clean trace storage.
    Step 2: Deploy OTel Collector (Operator CR first, manual fallback).
    Forwards traces to Tempo and exposes metrics as Prometheus format on :8889.
  params:
    - name: NAMESPACE
      description: Namespace to deploy OTel Collector
      type: string
      default: "llamastack-bench"
    - name: TEMPO_NAMESPACE
      description: Namespace where Tempo Operator is installed
      type: string
      default: "openshift-tempo-operator"
  steps:
    - name: flush-tempo
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        TEMPO_NS="$(params.TEMPO_NAMESPACE)"
        echo "=============================================="
        echo "Flushing Tempo trace storage"
        echo "=============================================="

        # Delete the TempoMonolithic CR and its PVCs to wipe all stored traces
        echo "Deleting TempoMonolithic CR..."
        oc delete tempomonolithic tracing -n $TEMPO_NS --ignore-not-found=true

        echo "Waiting for Tempo pods to terminate..."
        oc wait --for=delete pod -l app.kubernetes.io/instance=tracing -n $TEMPO_NS --timeout=120s 2>/dev/null || true
        sleep 5

        echo "Deleting Tempo PVCs..."
        oc delete pvc -l app.kubernetes.io/instance=tracing -n $TEMPO_NS --ignore-not-found=true
        sleep 3

        # Recreate the TempoMonolithic CR with a clean PV
        echo "Recreating TempoMonolithic CR..."
        cat <<'TEMPO_EOF' | oc apply -n $TEMPO_NS -f -
        apiVersion: tempo.grafana.com/v1alpha1
        kind: TempoMonolithic
        metadata:
          name: tracing
        spec:
          ingestion:
            otlp:
              grpc:
                enabled: true
              http:
                enabled: true
          multitenancy:
            enabled: true
            mode: openshift
            authentication:
            - tenantName: dev
              tenantId: "1610b0c3-c509-4592-a256-a1871353dbfa"
          jaegerui:
            enabled: true
            route:
              enabled: true
          queryFrontend:
            extraConfig:
              server:
                grpc_server_max_recv_msg_size: 20971520
                grpc_server_max_send_msg_size: 20971520
          storage:
            traces:
              backend: pv
              size: 10Gi
        TEMPO_EOF

        echo "Waiting for Tempo to become ready..."
        for i in $(seq 1 60); do
          POD_READY=$(oc get pod -n $TEMPO_NS -l app.kubernetes.io/instance=tracing -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
          if [ "$POD_READY" = "True" ]; then
            echo "Tempo is ready"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "WARNING: Tempo did not become ready within 120s, continuing anyway"
          fi
          sleep 2
        done

        echo ""
        echo "Tempo trace storage flushed — ready for clean trace collection"

    - name: deploy-otel-collector
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        NAMESPACE="$(params.NAMESPACE)"

        echo "=============================================="
        echo "Deploying OTel Collector"
        echo "=============================================="
        echo "Namespace: $NAMESPACE"

        # Clean existing
        oc delete opentelemetrycollector otel-collector -n $NAMESPACE 2>/dev/null || true
        oc delete deployment otel-collector -n $NAMESPACE --ignore-not-found=true
        oc delete service otel-collector -n $NAMESPACE --ignore-not-found=true
        oc delete configmap otel-collector-config -n $NAMESPACE --ignore-not-found=true
        sleep 3

        # Check if OTel Operator is available
        if oc get crd opentelemetrycollectors.opentelemetry.io &>/dev/null; then
          echo "OTel Operator detected — using CR"
          cat <<'CR_EOF' | oc apply -n $NAMESPACE -f -
        apiVersion: opentelemetry.io/v1beta1
        kind: OpenTelemetryCollector
        metadata:
          name: otel-collector
          labels:
            app: otel-collector
        spec:
          mode: deployment
          config:
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: 0.0.0.0:4317
                  http:
                    endpoint: 0.0.0.0:4318
            processors:
              batch:
                timeout: 5s
                send_batch_size: 1024
            exporters:
              otlp/tempo:
                endpoint: tempo-tracing.openshift-tempo-operator.svc.cluster.local:4317
                tls:
                  insecure: true
              prometheus:
                endpoint: 0.0.0.0:8889
              debug:
                verbosity: detailed
            service:
              pipelines:
                traces:
                  receivers: [otlp]
                  processors: [batch]
                  exporters: [otlp/tempo, debug]
                metrics:
                  receivers: [otlp]
                  processors: [batch]
                  exporters: [prometheus]
        CR_EOF

          echo "Waiting for Operator to create deployment..."
          for i in $(seq 1 30); do
            DEPLOY_NAME=$(oc get deployment -n $NAMESPACE -l app.kubernetes.io/component=opentelemetry-collector -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -n "$DEPLOY_NAME" ]; then
              oc wait --for=condition=available deployment/$DEPLOY_NAME -n $NAMESPACE --timeout=120s

              # Create alias Service so LlamaStack can reach it at otel-collector:4318
              cat <<'ALIAS_EOF' | oc apply -n $NAMESPACE -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: otel-collector
          labels:
            app: otel-collector
        spec:
          selector:
            app.kubernetes.io/component: opentelemetry-collector
          ports:
          - name: otlp-grpc
            port: 4317
            targetPort: 4317
          - name: otlp-http
            port: 4318
            targetPort: 4318
          - name: prometheus
            port: 8889
            targetPort: 8889
          type: ClusterIP
        ALIAS_EOF

              echo "OTel Collector ready (Operator): $DEPLOY_NAME"
              exit 0
            fi
            sleep 2
          done
          echo "WARNING: Operator deployment not created in time, falling back to manual"
        else
          echo "OTel Operator CRD not found — using manual deployment"
        fi

        # Manual fallback
        cat <<'CONFIG_EOF' | oc apply -n $NAMESPACE -f -
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: otel-collector-config
          labels:
            app: otel-collector
        data:
          otel-collector-config.yaml: |
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: 0.0.0.0:4317
                  http:
                    endpoint: 0.0.0.0:4318
            processors:
              batch:
                timeout: 5s
                send_batch_size: 1024
            exporters:
              otlp/tempo:
                endpoint: tempo-tracing.openshift-tempo-operator.svc.cluster.local:4317
                tls:
                  insecure: true
              prometheus:
                endpoint: 0.0.0.0:8889
              debug:
                verbosity: detailed
            service:
              pipelines:
                traces:
                  receivers: [otlp]
                  processors: [batch]
                  exporters: [otlp/tempo, debug]
                metrics:
                  receivers: [otlp]
                  processors: [batch]
                  exporters: [prometheus]
        CONFIG_EOF

        cat <<'DEPLOY_EOF' | oc apply -n $NAMESPACE -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: otel-collector
          labels:
            app: otel-collector
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: otel-collector
          template:
            metadata:
              labels:
                app: otel-collector
            spec:
              containers:
              - name: otel-collector
                image: otel/opentelemetry-collector-contrib:0.144.0
                args: ["--config=/conf/otel-collector-config.yaml"]
                ports:
                - containerPort: 4317
                  name: otlp-grpc
                - containerPort: 4318
                  name: otlp-http
                - containerPort: 8889
                  name: prometheus
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
                volumeMounts:
                - name: config
                  mountPath: /conf
              volumes:
              - name: config
                configMap:
                  name: otel-collector-config
        DEPLOY_EOF

        cat <<'SVC_EOF' | oc apply -n $NAMESPACE -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: otel-collector
          labels:
            app: otel-collector
        spec:
          selector:
            app: otel-collector
          ports:
          - name: otlp-grpc
            port: 4317
            targetPort: 4317
          - name: otlp-http
            port: 4318
            targetPort: 4318
          - name: prometheus
            port: 8889
            targetPort: 8889
          type: ClusterIP
        SVC_EOF

        oc wait --for=condition=available deployment/otel-collector -n $NAMESPACE --timeout=120s
        echo "OTel Collector ready (manual fallback)"
