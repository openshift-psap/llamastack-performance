apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-prompt
  namespace: tekton-llamastack
spec:
  description: |
    Generate synthetic prompts with an exact token count using the deployed
    model's tokenizer. Execs into the vLLM pod to access the tokenizer at
    /mnt/models, generates random text with unique seeds per prompt,
    encodes/truncates to the target token count, and writes the results to
    the shared workspace as a JSONL file (one prompt per line) for Locust.
    Also writes synthetic_prompt.txt with the first prompt for backward compat.
    Skipped when INPUT_TOKENS is 0 (Locust uses the PROMPT param as-is).
  params:
    - name: NAMESPACE
      description: Namespace where vLLM is deployed
      type: string
      default: "llamastack-bench"
    - name: MODEL_NAME
      description: vLLM InferenceService name (used to find the predictor pod)
      type: string
      default: "llama-32-3b-instruct"
    - name: INPUT_TOKENS
      description: "Target prompt length in tokens (0 = skip generation)"
      type: string
      default: "0"
    - name: USERS
      description: "Number of concurrent Locust users"
      type: string
      default: "1"
    - name: RUN_TIME_SECONDS
      description: "Test duration in seconds (used to calculate prompt pool size)"
      type: string
      default: "60"
  workspaces:
    - name: results
      description: Shared workspace where the generated prompts are written
  steps:
    - name: generate
      image: quay.io/openshift/origin-cli:latest
      script: |
        #!/bin/bash
        set -e

        INPUT_TOKENS="$(params.INPUT_TOKENS)"
        USERS="$(params.USERS)"
        NAMESPACE="$(params.NAMESPACE)"
        MODEL_NAME="$(params.MODEL_NAME)"
        PROMPTS_JSONL="$(workspaces.results.path)/synthetic_prompts.jsonl"
        PROMPT_FILE="$(workspaces.results.path)/synthetic_prompt.txt"

        if [ "$INPUT_TOKENS" -eq 0 ] 2>/dev/null; then
          echo "INPUT_TOKENS=0, skipping prompt generation"
          exit 0
        fi

        RUN_TIME_SECONDS="$(params.RUN_TIME_SECONDS)"

        echo "=============================================="
        echo "Generating synthetic prompts: ${INPUT_TOKENS} tokens each"
        echo "Users: ${USERS}, Test duration: ${RUN_TIME_SECONDS}s"
        echo "=============================================="

        PREDICTOR_POD=$(oc get pod -n $NAMESPACE -l serving.kserve.io/inferenceservice=$MODEL_NAME -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
        if [ -z "$PREDICTOR_POD" ]; then
          echo "ERROR: Could not find vLLM predictor pod for $MODEL_NAME in $NAMESPACE"
          exit 1
        fi
        echo "Using tokenizer from pod: $PREDICTOR_POD"

        # Calculate prompt pool size: USERS * RUN_TIME / 2 (avg wait_time)
        # capped at 5000 to keep generation time reasonable (~60s).
        # This ensures near-zero prompt repetition during the test.
        NUM_PROMPTS=$(python3 -c "print(min(int(int('$USERS') * int('$RUN_TIME_SECONDS') / 2), 5000))")
        echo "Will generate $NUM_PROMPTS unique prompts"

        cat > /tmp/gen_prompts.py << 'PYEOF'
        import sys
        import json
        import random
        import string
        import os
        import glob
        from transformers import AutoTokenizer

        target_tokens = int(sys.argv[1])
        num_prompts = int(sys.argv[2])

        # Detect model path: OCI modelcar has files at /mnt/models, RHAIIS uses HF cache
        model_path = "/mnt/models"
        if os.path.exists(os.path.join(model_path, "config.json")):
            print(f"Using OCI modelcar at: {model_path}", file=sys.stderr)
        else:
            # RHAIIS: model cached in HF format under /mnt/models/models--<org>--<name>/
            # Set HF_HUB_CACHE so from_pretrained finds it without re-downloading
            hf_dirs = glob.glob("/mnt/models/models--*")
            if hf_dirs:
                os.environ["HF_HUB_CACHE"] = "/mnt/models"
                # Extract model name from cache dir (e.g. models--Qwen--Qwen3-VL-30B-A3B-Instruct)
                dirname = os.path.basename(hf_dirs[0])
                model_path = dirname.replace("models--", "").replace("--", "/")
                print(f"Using RHAIIS HF cache, model: {model_path}", file=sys.stderr)
            else:
                print(f"WARNING: No model found at /mnt/models, trying path as-is", file=sys.stderr)

        tokenizer = AutoTokenizer.from_pretrained(model_path, trust_remote_code=True)

        # Build a large vocabulary from the tokenizer to maximize diversity.
        # Sample token IDs directly and decode — each prompt is a unique
        # sequence of tokens that shares minimal prefixes with others.
        vocab_size = tokenizer.vocab_size
        # Exclude special tokens and very short tokens
        valid_ids = [
            i for i in range(vocab_size)
            if len(tokenizer.decode([i]).strip()) > 1
            and tokenizer.decode([i]).strip() not in tokenizer.all_special_tokens
        ]

        for i in range(num_prompts):
            rng = random.Random(i)
            sampled_ids = rng.choices(valid_ids, k=target_tokens)
            prompt = tokenizer.decode(sampled_ids, skip_special_tokens=True)
            # Re-encode to get actual token count and trim if needed
            actual_ids = tokenizer.encode(prompt)[:target_tokens]
            prompt = tokenizer.decode(actual_ids, skip_special_tokens=True)
            actual = len(tokenizer.encode(prompt))
            print(json.dumps({"index": i, "tokens": actual, "prompt": prompt}))
            if i < 5 or i % 100 == 0:
                print(f"  prompt[{i}]: {actual} tokens", file=sys.stderr)

        print(f"Generated {num_prompts} prompts, each ~{target_tokens} tokens", file=sys.stderr)
        PYEOF

        oc cp /tmp/gen_prompts.py $NAMESPACE/$PREDICTOR_POD:/tmp/gen_prompts.py
        oc exec -n $NAMESPACE $PREDICTOR_POD -- python3 /tmp/gen_prompts.py $INPUT_TOKENS $NUM_PROMPTS > "$PROMPTS_JSONL"

        PROMPT_COUNT=$(wc -l < "$PROMPTS_JSONL" | tr -d ' ')
        FILE_SIZE=$(du -h "$PROMPTS_JSONL" | cut -f1)
        echo "Generated ${PROMPT_COUNT} prompts to ${PROMPTS_JSONL} (${FILE_SIZE})"

        # Write first prompt to synthetic_prompt.txt for backward compatibility
        head -1 "$PROMPTS_JSONL" | python3 -c "import sys,json; print(json.load(sys.stdin)['prompt'])" > "$PROMPT_FILE"
        echo "First prompt also written to synthetic_prompt.txt"
        echo "Target: ${INPUT_TOKENS} tokens x ${PROMPT_COUNT} prompts (${USERS} users)"
