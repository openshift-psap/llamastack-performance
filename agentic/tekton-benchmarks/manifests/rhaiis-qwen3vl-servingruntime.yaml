# RHAIIS ServingRuntime for Qwen3-VL-30B-A3B-Instruct (2 GPUs, tensor parallel)
# Image: Red Hat AI Inference Server (RHAIIS) vLLM CUDA
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/template-display-name: ServingRuntime for RHAIIS vLLM CUDA
  labels:
    opendatahub.io/dashboard: "true"
  name: qwen3-vl-30b-a3b-instruct
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: 900000
  containers:
  - command:
    - python3
    - -m
    - vllm.entrypoints.openai.api_server
    args:
    - --model=Qwen/Qwen3-VL-30B-A3B-Instruct
    - --download-dir=/mnt/models
    - --port=8080
    - --served-model-name={{.Name}}
    - --max-model-len=32768
    - --tensor-parallel-size=2
    - --dtype=bfloat16
    - --gpu-memory-utilization=0.85
    - --no-enable-prefix-caching
    - --enable-chunked-prefill
    - --enable-expert-parallel
    - --trust-remote-code
    - --no-enable-log-requests
    - --enable-auto-tool-choice
    - --tool-call-parser=hermes
    - --limit-mm-per-prompt={"video":0}
    env:
    - name: VLLM_USE_V1
      value: "1"
    - name: HF_HUB_OFFLINE
      value: "0"
    - name: HF_HOME
      value: /tmp/hf_home
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.1
    name: kserve-container
    ports:
    - containerPort: 8080
      protocol: TCP
    volumeMounts:
    - mountPath: /dev/shm
      name: shm
  multiModel: false
  supportedModelFormats:
  - autoSelect: true
    name: pytorch
  volumes:
  - emptyDir:
      medium: Memory
      sizeLimit: 12Gi
    name: shm
