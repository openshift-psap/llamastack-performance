# Dashboard: GPU — NVIDIA DCGM hardware metrics
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gpu
  namespace: llamastack-monitoring
  labels:
    app: grafana
data:
  gpu.json: |
    {
      "annotations": { "list": [{ "datasource": { "type": "grafana", "uid": "-- Grafana --" }, "enable": true, "iconColor": "red", "name": "Benchmarks", "target": { "refId": "Anno", "tags": ["benchmark"], "type": "tags" } }] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "GPU Utilization % (DCGM)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "GPU {{gpu}}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } },
          "id": 1
        },
        {
          "title": "GPU Memory (DCGM)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "DCGM_FI_DEV_FB_USED / 1024", "legendFormat": "GPU {{gpu}} used" },
            { "expr": "DCGM_FI_DEV_FB_FREE / 1024", "legendFormat": "GPU {{gpu}} free" }
          ],
          "fieldConfig": { "defaults": { "unit": "gibibytes" } },
          "id": 2
        },
        {
          "title": "GPU Temperature (DCGM)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "GPU {{gpu}}" }],
          "fieldConfig": { "defaults": { "unit": "celsius" } },
          "id": 3
        },
        {
          "title": "GPU Power (DCGM)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "GPU {{gpu}}" }],
          "fieldConfig": { "defaults": { "unit": "watt" } },
          "id": 4
        },
        {
          "title": "GPU PCIe Throughput (DCGM)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "rate(DCGM_FI_PROF_PCIE_TX_BYTES[1m])", "legendFormat": "GPU {{gpu}} TX" },
            { "expr": "rate(DCGM_FI_PROF_PCIE_RX_BYTES[1m])", "legendFormat": "GPU {{gpu}} RX" }
          ],
          "fieldConfig": { "defaults": { "unit": "KBs" } },
          "id": 5
        }
      ],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "GPU",
      "uid": "llamastack-gpu",
      "tags": ["llamastack", "gpu"]
    }
