apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ocp
  namespace: llamastack-monitoring
  labels:
    app: grafana
data:
  ocp-cluster-overview.json: |
    {
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "Cluster CPU Usage", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(node_cpu_seconds_total{mode!=\"idle\"}[1m])) by (instance)", "legendFormat": "{{instance}}" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Cluster Memory Usage", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(node_memory_MemTotal_bytes) by (instance)", "legendFormat": "{{instance}} total" },
            { "expr": "sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) by (instance)", "legendFormat": "{{instance}} used" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "title": "Pod Count by Namespace", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "count(kube_pod_info) by (namespace)", "legendFormat": "{{namespace}}" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Pod Status (benchmark namespace)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", phase=\"Running\"})", "legendFormat": "Running" },
            { "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", phase=\"Pending\"})", "legendFormat": "Pending" },
            { "expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\", phase=\"Failed\"})", "legendFormat": "Failed" }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Pod CPU Usage (benchmark namespace)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}[1m])) by (pod)", "legendFormat": "{{pod}}" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Pod Memory Usage (benchmark namespace)", "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", container!=\"POD\"}", "legendFormat": "{{pod}}/{{container}}" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        }
      ],
      "templating": {
        "list": [{
          "name": "namespace",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "definition": "label_values(kube_pod_info, namespace)",
          "current": { "text": "llamastack-bench", "value": "llamastack-bench" },
          "includeAll": true, "multi": true, "refresh": 2, "type": "query"
        }]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "OCP Cluster Overview",
      "uid": "ocp-cluster-overview",
      "tags": ["llamastack", "cluster"]
    }
