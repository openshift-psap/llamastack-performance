# Dashboard 5: Overview — Locust load test results + Trace analysis + HPA scaling
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-llamastack
  namespace: llamastack-monitoring
  labels:
    app: grafana
data:
  overview.json: |
    {
      "annotations": { "list": [{ "datasource": { "type": "grafana", "uid": "-- Grafana --" }, "enable": true, "iconColor": "red", "name": "Benchmarks", "target": { "refId": "Anno", "tags": ["benchmark"], "type": "tags" } }] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100, "title": "Locust Load Test (from Pushgateway)", "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 1 }, "id": 1,
          "targets": [{ "expr": "locust_total_requests{run_id=~\"$run_id\"}", "legendFormat": "total", "refId": "A" }],
          "title": "Total Requests", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "fixed", "fixedColor": "yellow" }, "thresholds": { "mode": "absolute", "steps": [{"color": "yellow", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 1 }, "id": 2,
          "targets": [
            { "expr": "locust_response_time_p50_ms{run_id=~\"$run_id\"} / 1000", "legendFormat": "p50", "refId": "A" },
            { "expr": "locust_response_time_p95_ms{run_id=~\"$run_id\"} / 1000", "legendFormat": "p95", "refId": "B" },
            { "expr": "locust_response_time_p99_ms{run_id=~\"$run_id\"} / 1000", "legendFormat": "p99", "refId": "C" }
          ],
          "title": "Response Time Percentiles", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 1 }, "id": 3,
          "targets": [{ "expr": "locust_requests_per_second{run_id=~\"$run_id\"}", "legendFormat": "req/s", "refId": "A" }],
          "title": "Requests/sec", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 1 }, "id": 4,
          "targets": [{ "expr": "locust_failure_rate_pct{run_id=~\"$run_id\"}", "legendFormat": "failure %", "refId": "A" }],
          "title": "Failure Rate", "type": "stat"
        },
        {
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 },
          "id": 200, "title": "Trace Analysis (from Pushgateway)", "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms", "color": { "mode": "palette-classic" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] } } },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 9 }, "id": 5,
          "targets": [
            { "expr": "trace_trace_inference_p50_ms{run_id=~\"$run_id\"}", "legendFormat": "inference", "refId": "A" },
            { "expr": "trace_trace_db_p50_ms{run_id=~\"$run_id\"}", "legendFormat": "database", "refId": "B" },
            { "expr": "trace_trace_ls_overhead_p50_ms{run_id=~\"$run_id\"}", "legendFormat": "LS overhead", "refId": "C" }
          ],
          "title": "Latency Breakdown (p50)", "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms", "color": { "mode": "fixed", "fixedColor": "orange" }, "thresholds": { "mode": "absolute", "steps": [{"color": "orange", "value": null}] } } },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 9 }, "id": 6,
          "targets": [
            { "expr": "trace_trace_total_request_p50_ms{run_id=~\"$run_id\"}", "legendFormat": "p50", "refId": "A" },
            { "expr": "trace_trace_total_request_p95_ms{run_id=~\"$run_id\"}", "legendFormat": "p95", "refId": "B" },
            { "expr": "trace_trace_total_request_p99_ms{run_id=~\"$run_id\"}", "legendFormat": "p99", "refId": "C" }
          ],
          "title": "E2E Latency (trace)", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "purple" }, "thresholds": { "mode": "absolute", "steps": [{"color": "purple", "value": null}] } } },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 9 }, "id": 7,
          "targets": [
            { "expr": "trace_last_input_tokens{run_id=~\"$run_id\"}", "legendFormat": "input", "refId": "A" },
            { "expr": "trace_last_output_tokens{run_id=~\"$run_id\"}", "legendFormat": "output", "refId": "B" },
            { "expr": "trace_last_tool_calls{run_id=~\"$run_id\"}", "legendFormat": "tool calls", "refId": "C" }
          ],
          "title": "Tokens & Tool Calls (last req)", "type": "stat"
        },
        {
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 300, "title": "HPA / Scaling (from Pushgateway)", "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 17 }, "id": 30,
          "targets": [{ "expr": "hpa_pod_count{run_id=~\"$run_id\"}", "legendFormat": "pods", "refId": "A" }],
          "title": "Pod Count", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "blue" }, "thresholds": { "mode": "absolute", "steps": [{"color": "blue", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 17 }, "id": 31,
          "targets": [
            { "expr": "hpa_current_replicas{run_id=~\"$run_id\"}", "legendFormat": "current", "refId": "A" },
            { "expr": "hpa_desired_replicas{run_id=~\"$run_id\"}", "legendFormat": "desired", "refId": "B" }
          ],
          "title": "HPA Replicas", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "orange" }, "thresholds": { "mode": "absolute", "steps": [{"color": "orange", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 17 }, "id": 32,
          "targets": [{ "expr": "hpa_avg_cpu_n{run_id=~\"$run_id\"} / 1e6", "legendFormat": "CPU (millicores)", "refId": "A" }],
          "title": "Avg CPU (millicores)", "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "decbytes", "color": { "mode": "fixed", "fixedColor": "purple" }, "thresholds": { "mode": "absolute", "steps": [{"color": "purple", "value": null}] } } },
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 17 }, "id": 33,
          "targets": [{ "expr": "hpa_avg_memory_ki{run_id=~\"$run_id\"} * 1024", "legendFormat": "memory", "refId": "A" }],
          "title": "Avg Memory", "type": "stat"
        }
      ],
      "schemaVersion": 39,
      "tags": ["llamastack", "overview"],
      "templating": {
        "list": [
          { "current": { "text": "All", "value": "$__all" }, "datasource": { "type": "prometheus", "uid": "prometheus" }, "definition": "label_values(up, namespace)", "hide": 0, "includeAll": true, "multi": true, "name": "namespace", "query": { "query": "label_values(up, namespace)", "refId": "ns" }, "refresh": 2, "type": "query" },
          { "current": { "text": "All", "value": "$__all" }, "datasource": { "type": "prometheus", "uid": "prometheus" }, "definition": "label_values(locust_total_requests, run_id)", "hide": 0, "includeAll": true, "multi": false, "name": "run_id", "query": { "query": "label_values(locust_total_requests, run_id)", "refId": "rid" }, "refresh": 2, "type": "query" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Overview",
      "uid": "llamastack-overview"
    }
