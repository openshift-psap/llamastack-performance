apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-sim
  labels:
    app: inference-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-sim
  template:
    metadata:
      labels:
        app: inference-sim
    spec:
      nodeSelector:
        node-role: loadgen
      containers:
      - name: inference-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.10.0
        args:
        - "--model"
        - "simulator"
        - "--port"
        - "8000"
        - "--max-num-seqs"
        - "2048"
        - "--max-model-len"
        - "8192"
        - "--time-to-first-token"
        - "1ms"
        - "--inter-token-latency"
        - "1ms"
        - "--mode"
        - "random"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inference-sim
  labels:
    app: inference-sim
spec:
  selector:
    app: inference-sim
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: inference-sim-metrics
  labels:
    app: inference-sim
spec:
  endpoints:
    - port: http
      path: /metrics
      interval: 5s
  selector:
    matchLabels:
      app: inference-sim
