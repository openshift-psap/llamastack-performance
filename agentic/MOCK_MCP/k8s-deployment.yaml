apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-mcp-server
  labels:
    app: benchmark-mcp-server
    component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benchmark-mcp-server
  template:
    metadata:
      labels:
        app: benchmark-mcp-server
        component: mcp
    spec:
      containers:
      - name: benchmark-mcp-server
        image: quay.io/rh-ee-ashtarkb/mock_mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: NUM_TOOLS
          value: "1"
        - name: TOOL_RESPONSE_TOKENS
          value: "100"
        - name: TOOL_DESCRIPTION_TOKENS
          value: "0"
        - name: TOKENIZER_MODEL
          value: "Qwen/Qwen3-VL-30B-A3B-Instruct"
        - name: POOL_SIZE
          value: "50"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: benchmark-mcp-server
  labels:
    app: benchmark-mcp-server
    component: mcp
spec:
  selector:
    app: benchmark-mcp-server
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
